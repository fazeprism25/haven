# Reverse proxy for Haven's FastAPI server (uvicorn on 127.0.0.1:8765).
#
# Haven's server has no built-in authentication by design -- it assumes a
# single user on localhost (see obsidian/server/README.md's closing note).
# Putting it on the public internet without *something* in front of it
# means anyone who finds the IP can read and rewrite your memory vault.
# This config puts HTTP Basic Auth in front of everything except the plain
# health check, so:
#   - GET /api/v1/health stays open (safe: read-only, no vault data) --
#     lets you (or a hackathon judge) prove the deployment is live with a
#     single unauthenticated curl.
#   - Everything else (the dashboard, retrieval, memory writes) requires
#     the credentials you set up with htpasswd in provision.sh.
#
# Install as /etc/nginx/sites-available/haven.conf, symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.

server {
    listen 80;
    listen [::]:80;
    server_name _;  # replace with your domain if you have one, e.g. haven.example.com

    client_max_body_size 10m;

    location = /api/v1/health {
        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        auth_basic "Haven";
        auth_basic_user_file /etc/nginx/haven.htpasswd;

        proxy_pass http://127.0.0.1:8765;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# --- With a domain name + TLS ---
# If you point a domain at this instance's public IP, run:
#   sudo certbot --nginx -d haven.example.com
# Certbot rewrites this file in place to add a matching `listen 443 ssl`
# server block and an HTTP->HTTPS redirect -- no manual edits needed here
# first, just make sure `server_name` above is your real domain before
# running certbot.
