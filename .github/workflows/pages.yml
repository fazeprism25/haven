name: Deploy Interactive Documentation to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - obsidian/docs/media/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          # Copy every asset alongside the article (SVGs, PNGs, etc.) so the
          # article's relative image paths resolve once deployed, then place
          # the article itself as the site's index.
          rsync -a --exclude 'haven-article.html' obsidian/docs/media/ _site/
          cp obsidian/docs/media/haven-article.html _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
