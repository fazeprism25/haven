<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2020 1040" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8a8a"/>
    </marker>
    <marker id="arrowV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
  </defs>
  <style>
    .bg { fill:#ffffff; }
    .box { fill:#fafafa; stroke:#1a1a1a; stroke-width:1.5; rx:6; }
    .boxAccent { fill:#f5f0fe; stroke:#7c3aed; stroke-width:1.5; rx:6; }
    .boxAccentDashed { fill:#f5f0fe; stroke:#7c3aed; stroke-width:1.5; stroke-dasharray:5,4; rx:6; }
    .gate { fill:#fafafa; stroke:#1a1a1a; stroke-width:2; }
    .container { fill:#ffffff; stroke:#b5b5b5; stroke-width:1.3; stroke-dasharray:4,3; rx:8; }
    .callout { fill:#ffffff; stroke:#8a8a8a; stroke-width:1.3; stroke-dasharray:4,3; rx:6; }
    .calloutAccent { fill:#ffffff; stroke:#7c3aed; stroke-width:1.3; stroke-dasharray:4,3; rx:6; }
    .lbl { font-size:13px; font-weight:600; fill:#141414; text-anchor:middle; }
    .lblSm { font-size:11.5px; font-weight:600; fill:#141414; text-anchor:middle; }
    .path { font-family:'Consolas','SF Mono',Menlo,monospace; font-size:9.8px; fill:#6b6b6b; text-anchor:middle; }
    .note { font-family:'Consolas','SF Mono',Menlo,monospace; font-size:9.8px; fill:#7c3aed; text-anchor:middle; }
    .arrow { stroke:#1a1a1a; stroke-width:1.6; fill:none; marker-end:url(#arrowB); }
    .arrowDashed { stroke:#8a8a8a; stroke-width:1.5; fill:none; stroke-dasharray:6,4; marker-end:url(#arrowG); }
    .arrowAccent { stroke:#7c3aed; stroke-width:1.5; fill:none; stroke-dasharray:6,4; marker-end:url(#arrowV); }
    .edgeLbl { font-size:10px; fill:#5a5a5a; text-anchor:middle; }
    .colHdr { font-size:10.5px; font-weight:700; fill:#5a5a5a; text-anchor:middle; }
    .title { font-size:23px; font-weight:700; fill:#111111; text-anchor:middle; }
    .subtitle { font-size:12.5px; fill:#5a5a5a; text-anchor:middle; }
    .laneTag { font-size:11px; font-weight:700; fill:#8a8a8a; letter-spacing:1.5px; }
    .footerTxt { font-family:'Consolas','SF Mono',Menlo,monospace; font-size:10.5px; fill:#6b6b6b; text-anchor:middle; }
    .legendTxt { font-size:10.5px; fill:#333333; }
    .legendTitle { font-size:11px; font-weight:700; fill:#333333; }
  </style>

  <rect class="bg" x="0" y="0" width="2020" height="1040"/>

  <text class="title" x="1010" y="36">Haven Architecture</text>
  <text class="subtitle" x="1010" y="56">Write (Manager AI) and read (Memory Engine) are separate lanes that meet at a Markdown vault + concept graph.</text>

  <!-- lane tags -->
  <text class="laneTag" x="150" y="124">WRITE — obsidian/manager_ai/</text>
  <text class="laneTag" x="1515" y="118" text-anchor="middle">READ — obsidian/memory_engine/</text>

  <!-- ===================== WRITE LANE ===================== -->
  <!-- w1 input -->
  <rect class="box" x="150" y="132" width="300" height="66"/>
  <text class="lbl" x="300" y="158">ChatGPT capture · Quick Capture</text>
  <text class="lbl" x="300" y="174">· Obsidian import</text>
  <text class="path" x="300" y="190">extension/, main.py: /memory /capture /import/obsidian/*</text>

  <!-- w2 Extractor (LLM) -->
  <rect class="boxAccent" x="150" y="237" width="300" height="66"/>
  <text class="lbl" x="300" y="264">Extractor</text>
  <text class="path" x="300" y="282">manager_ai/extractor.py — LLM call</text>
  <text class="note" x="300" y="296">1 retry on bad JSON (repair prompt)</text>

  <!-- w3 Classifier + ImportanceScorer (LLM, parallel per fact) -->
  <rect class="boxAccent" x="150" y="342" width="140" height="66"/>
  <text class="lbl" x="220" y="368">Classifier</text>
  <text class="path" x="220" y="386">classifier.py</text>
  <rect class="boxAccent" x="310" y="342" width="140" height="66"/>
  <text class="lbl" x="380" y="368">Importance-</text>
  <text class="lbl" x="380" y="380">Scorer</text>
  <text class="path" x="380" y="396">importance.py</text>
  <line class="arrow" x1="290" y1="375" x2="308" y2="375"/>
  <text class="note" x="300" y="415">per fact, concurrent across facts (ThreadPoolExecutor)</text>

  <!-- w4 CanonicalMatcher -->
  <rect class="box" x="150" y="447" width="300" height="66"/>
  <text class="lbl" x="300" y="474">CanonicalMatcher</text>
  <text class="path" x="300" y="490">canonical_matcher.py — deterministic, no LLM</text>
  <text class="note" x="300" y="504" fill="#5a5a5a">→ NEW · CONFIRM · UPDATE</text>

  <!-- w5 KnowledgeUpdater -->
  <rect class="box" x="150" y="552" width="300" height="66"/>
  <text class="lbl" x="300" y="582">KnowledgeUpdater</text>
  <text class="path" x="300" y="600">manager_ai/knowledge_updater.py</text>

  <!-- w6 VaultWriter -->
  <rect class="box" x="150" y="657" width="300" height="66"/>
  <text class="lbl" x="300" y="687">VaultWriter</text>
  <text class="path" x="300" y="705">memory_engine/vault_writer.py</text>

  <!-- w7 OntologyPipeline -->
  <rect class="box" x="150" y="762" width="300" height="66"/>
  <text class="lbl" x="300" y="789">OntologyPipeline</text>
  <text class="path" x="300" y="805">ontology/ontology_pipeline.py</text>
  <text class="note" x="300" y="819" fill="#5a5a5a">only component allowed to mutate the graph</text>

  <!-- write lane arrows -->
  <line class="arrow" x1="300" y1="198" x2="300" y2="235"/>
  <line class="arrow" x1="300" y1="303" x2="300" y2="340"/>
  <line class="arrow" x1="300" y1="408" x2="300" y2="445"/>
  <line class="arrow" x1="300" y1="513" x2="300" y2="550"/>
  <line class="arrow" x1="300" y1="618" x2="300" y2="655"/>
  <line class="arrow" x1="300" y1="723" x2="300" y2="760"/>
  <text class="edgeLbl" x="330" y="742">write, then</text>

  <!-- ===================== MIDDLE (meeting point) ===================== -->
  <rect class="container" x="672" y="640" width="280" height="215"/>
  <text class="laneTag" x="812" y="632" text-anchor="middle">MEETING POINT — on disk</text>

  <rect class="box" x="692" y="660" width="240" height="66"/>
  <text class="lbl" x="812" y="687">Haven Vault</text>
  <text class="path" x="812" y="705">Markdown files, one per KnowledgeObject</text>

  <rect class="box" x="692" y="765" width="240" height="66"/>
  <text class="lbl" x="812" y="792">ConceptGraph + AliasIndex</text>
  <text class="path" x="812" y="808">obsidian/ontology/ — in-memory, loaded per space</text>

  <!-- write -> middle -->
  <line class="arrow" x1="450" y1="690" x2="690" y2="690"/>
  <line class="arrow" x1="450" y1="795" x2="690" y2="795"/>

  <!-- ===================== READ LANE (mirrors write, bottom-to-top flow) ===================== -->
  <!-- shared trunk: raw query -> QueryRewriter -> HybridCandidateRetriever -> DeterministicRanker -->
  <rect class="box" x="1170" y="881" width="300" height="66"/>
  <text class="lbl" x="1320" y="908">raw query</text>
  <text class="path" x="1320" y="924">extension · dashboard · benchmark adapter</text>

  <rect class="boxAccentDashed" x="1170" y="776" width="300" height="66"/>
  <text class="lbl" x="1320" y="803">QueryRewriter</text>
  <text class="path" x="1320" y="819">memory_engine/query_rewriter.py — LLM call</text>
  <text class="note" x="1320" y="833">opt-in, off by default · fail-open</text>

  <rect class="box" x="1170" y="671" width="300" height="66"/>
  <text class="lbl" x="1320" y="698">HybridCandidateRetriever</text>
  <text class="path" x="1320" y="716">memory_engine/hybrid_candidate_retriever.py</text>
  <text class="note" x="1320" y="730" fill="#5a5a5a">keyword ∪ concept-activation, merged by id</text>

  <rect class="box" x="1170" y="566" width="300" height="66"/>
  <text class="lbl" x="1320" y="593">DeterministicRanker</text>
  <text class="path" x="1320" y="611">memory_engine/deterministic_ranker.py</text>
  <text class="note" x="1320" y="625" fill="#5a5a5a">scores every candidate, filters nothing</text>

  <!-- ContextPlanner: side input, feeds the fork below, not the shared trunk -->
  <rect class="box" x="980" y="472" width="170" height="56"/>
  <text class="lblSm" x="1065" y="492">ContextPlanner</text>
  <text class="path" x="1065" y="506" style="font-size:8.6px">context_planner.py — no LLM</text>
  <text class="note" x="1065" y="518" fill="#5a5a5a" style="font-size:8.3px">runs first, on raw query</text>
  <line class="arrowAccent" x1="1150" y1="500" x2="1168" y2="500"/>

  <!-- fork: DeterministicRanker's output splits into two acceptance/allocation policies -->
  <line class="arrow" x1="1320" y1="566" x2="1320" y2="528"/>
  <line class="arrow" x1="1330" y1="566" x2="1705" y2="530"/>
  <text class="edgeLbl" x="1560" y="554">fork: same ranked candidates, two accept/allocate policies</text>

  <text class="colHdr" x="1320" y="466">ContextBuilder path — global acceptance</text>
  <text class="colHdr" x="1710" y="466">WorkingContext path — topic-diversified acceptance</text>

  <!-- ============ LEFT COLUMN: legacy ContextBuilder path (/retrieve_context) ============ -->
  <!-- L1 CategoryPreferenceScorer -->
  <rect class="box" x="1170" y="472" width="300" height="56"/>
  <text class="lblSm" x="1320" y="492">CategoryPreferenceScorer</text>
  <text class="path" x="1320" y="506" style="font-size:8.6px">memory_engine/category_preference.py</text>
  <text class="note" x="1320" y="518" fill="#5a5a5a" style="font-size:8.3px">bonus for plan-requested categories, from ContextPlanner</text>

  <!-- L2 AcceptanceStage (global) -->
  <polygon class="gate" points="1180,386 1460,386 1445,442 1195,442"/>
  <text class="lblSm" x="1320" y="406">AcceptanceStage</text>
  <text class="path" x="1320" y="420" style="font-size:8.6px">memory_engine/acceptance_stage.py</text>
  <text class="note" x="1320" y="432" fill="#5a5a5a" style="font-size:8.3px">one global pass · abstain → gap cut → floor → cap</text>

  <!-- L3 DeterministicSlotAllocator -->
  <rect class="box" x="1170" y="300" width="300" height="56"/>
  <text class="lblSm" x="1320" y="320">DeterministicSlotAllocator</text>
  <text class="path" x="1320" y="334" style="font-size:8.6px">memory_engine/deterministic_slot_allocator.py</text>
  <text class="note" x="1320" y="346" fill="#5a5a5a" style="font-size:8.3px">context-budget cap — rarely binds</text>

  <!-- L4 ContextBuilder -->
  <rect class="box" x="1170" y="214" width="300" height="56"/>
  <text class="lblSm" x="1320" y="236">ContextBuilder</text>
  <text class="path" x="1320" y="250" style="font-size:8.6px">memory_engine/context_builder.py — flat text, legacy</text>
  <text class="note" x="1320" y="262" fill="#5a5a5a" style="font-size:7.8px">+Coverage/GapRecovery/ProjectState (trace-only)</text>

  <!-- L5 output -->
  <rect class="box" x="1170" y="132" width="300" height="66"/>
  <text class="lbl" x="1320" y="156">context string</text>
  <text class="path" x="1320" y="172">POST /retrieve_context</text>
  <text class="lblSm" x="1320" y="189" style="font-size:10.5px">→ injected into the LLM's conversation</text>

  <!-- left column arrows -->
  <line class="arrow" x1="1320" y1="472" x2="1320" y2="442"/>
  <line class="arrow" x1="1320" y1="386" x2="1320" y2="356"/>
  <line class="arrow" x1="1320" y1="300" x2="1320" y2="270"/>
  <line class="arrow" x1="1320" y1="214" x2="1320" y2="198"/>

  <!-- ============ RIGHT COLUMN: live WorkingContext path (/retrieve_working_context) ============ -->
  <!-- R1 AcceptanceStage (topic-diversified) -->
  <polygon class="gate" points="1570,472 1850,472 1835,528 1585,528"/>
  <text class="lblSm" x="1710" y="492">AcceptanceStage</text>
  <text class="path" x="1710" y="506" style="font-size:8.6px">memory_engine/acceptance_stage.py</text>
  <text class="note" x="1710" y="516" fill="#5a5a5a" style="font-size:7.8px">per-topic pass + category fallback (CONTINUATION)</text>

  <!-- R2 DeterministicSlotAllocator -->
  <rect class="box" x="1560" y="386" width="300" height="56"/>
  <text class="lblSm" x="1710" y="406">DeterministicSlotAllocator</text>
  <text class="path" x="1710" y="420" style="font-size:8.6px">memory_engine/deterministic_slot_allocator.py</text>
  <text class="note" x="1710" y="432" fill="#5a5a5a" style="font-size:8.3px">same class, called via _accept_and_allocate</text>

  <!-- R3 WorkingContextBuilder -->
  <rect class="box" x="1560" y="300" width="300" height="56"/>
  <text class="lblSm" x="1710" y="320">WorkingContextBuilder</text>
  <text class="path" x="1710" y="334" style="font-size:8.6px">memory_engine/working_context_builder.py</text>
  <text class="note" x="1710" y="346" fill="#5a5a5a" style="font-size:8.3px">groups allocated candidates by anchor concept</text>

  <!-- R4 StructuredPromptBuilder -->
  <rect class="box" x="1560" y="214" width="300" height="56"/>
  <text class="lblSm" x="1710" y="234">StructuredPromptBuilder</text>
  <text class="path" x="1710" y="248" style="font-size:8.6px">memory_engine/structured_prompt_builder.py</text>
  <text class="note" x="1710" y="260" fill="#5a5a5a" style="font-size:8.3px">+ProjectState, rendered for CONTINUATION-mode queries</text>

  <!-- R5 output -->
  <rect class="box" x="1560" y="132" width="300" height="66"/>
  <text class="lbl" x="1710" y="156">&lt;HavenContext&gt; XML prompt</text>
  <text class="path" x="1710" y="172">POST /retrieve_working_context</text>
  <text class="lblSm" x="1710" y="189" style="font-size:10.5px">→ injected into the LLM's conversation</text>

  <!-- right column arrows -->
  <line class="arrow" x1="1710" y1="472" x2="1710" y2="442"/>
  <line class="arrow" x1="1710" y1="386" x2="1710" y2="356"/>
  <line class="arrow" x1="1710" y1="300" x2="1710" y2="270"/>
  <line class="arrow" x1="1710" y1="214" x2="1710" y2="198"/>

  <!-- shared trunk arrows -->
  <line class="arrow" x1="1320" y1="881" x2="1320" y2="844"/>
  <text class="edgeLbl" x="1240" y="864">original query</text>
  <line class="arrowAccent" x1="1320" y1="776" x2="1320" y2="750"/>
  <text class="edgeLbl" x="1400" y="764">+ up to 2 rewrites</text>
  <line class="arrow" x1="1320" y1="671" x2="1320" y2="739"/>
  <line class="arrow" x1="1320" y1="566" x2="1320" y2="669"/>

  <!-- middle -> read (dual retrieval paths) -->
  <line class="arrow" x1="932" y1="693" x2="1168" y2="704"/>
  <text class="edgeLbl" x="1050" y="685">keyword path</text>
  <line class="arrow" x1="932" y1="798" x2="1168" y2="704"/>
  <text class="edgeLbl" x="1050" y="758">ontology path (activation spreading)</text>

  <!-- abstain callout -->
  <rect class="calloutAccent" x="1885" y="472" width="130" height="56"/>
  <text class="lblSm" x="1950" y="490">Abstain / Reject</text>
  <text class="note" x="1950" y="504" style="font-size:8.6px">reason kept in</text>
  <text class="note" x="1950" y="516" style="font-size:8.6px">RetrievalTrace</text>
  <line class="arrowAccent" x1="1860" y1="500" x2="1883" y2="500"/>

  <!-- checkpoint callout -->
  <rect class="callout" x="20" y="195" width="112" height="80"/>
  <text class="lblSm" x="76" y="216">Conversation-</text>
  <text class="lblSm" x="76" y="229">Checkpoint</text>
  <text class="note" x="76" y="245" fill="#8a8a8a">checkpoint/</text>
  <text class="note" x="76" y="258" fill="#8a8a8a">dedup, best-</text>
  <text class="note" x="76" y="270" fill="#8a8a8a">effort</text>
  <line class="arrowDashed" x1="132" y1="235" x2="148" y2="235"/>

  <!-- footer: shared core -->
  <rect class="callout" x="150" y="965" width="1720" height="38"/>
  <text class="footerTxt" x="1010" y="988">obsidian/core/ — Conversation, Event, Role, SourceType, MemoryType, EntityType — shared value objects used by every stage in both lanes</text>

  <!-- legend -->
  <rect class="callout" x="1670" y="6" width="330" height="96"/>
  <text class="legendTitle" x="1685" y="23">Legend</text>
  <line x1="1685" y1="36" x2="1715" y2="36" class="arrow"/>
  <text class="legendTxt" x="1722" y="40">deterministic call, no LLM</text>
  <line x1="1685" y1="53" x2="1715" y2="53" class="arrowDashed"/>
  <text class="legendTxt" x="1722" y="57">optional / best-effort, fail-open</text>
  <line x1="1685" y1="70" x2="1715" y2="70" class="arrowAccent"/>
  <text class="legendTxt" x="1722" y="74">abstain / reject outcome, or ContextPlan hand-off</text>
  <rect x="1685" y="81" width="30" height="12" class="boxAccent"/>
  <text class="legendTxt" x="1722" y="91">LLM call (non-deterministic)</text>
</svg>
