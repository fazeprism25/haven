<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1700 1460" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/></marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8a8a8a"/></marker>
    <marker id="arrowV" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/></marker>
  </defs>
  <style>
    .bg { fill:#ffffff; }
    .box { fill:#fafafa; stroke:#1a1a1a; stroke-width:1.5; rx:6; }
    .boxAccent { fill:#f5f0fe; stroke:#7c3aed; stroke-width:1.5; rx:6; }
    .gate { fill:#fafafa; stroke:#1a1a1a; stroke-width:2; }
    .container { fill:#ffffff; stroke:#b5b5b5; stroke-width:1.3; stroke-dasharray:4,3; rx:10; }
    .callout { fill:#ffffff; stroke:#8a8a8a; stroke-width:1.3; stroke-dasharray:4,3; rx:6; }
    .calloutAccent { fill:#fff8ec; stroke:#b8860b; stroke-width:1.3; stroke-dasharray:4,3; rx:6; }
    .lbl { font-size:14px; font-weight:600; fill:#141414; text-anchor:middle; }
    .lblSm { font-size:11.5px; font-weight:600; fill:#141414; text-anchor:middle; }
    .path { font-family:'Consolas','SF Mono',Menlo,monospace; font-size:10px; fill:#6b6b6b; text-anchor:middle; }
    .note { font-family:'Consolas','SF Mono',Menlo,monospace; font-size:10px; fill:#7c3aed; text-anchor:middle; }
    .noteG { font-family:'Consolas','SF Mono',Menlo,monospace; font-size:9.8px; fill:#5a5a5a; text-anchor:middle; }
    .arrow { stroke:#1a1a1a; stroke-width:1.6; fill:none; marker-end:url(#arrowB); }
    .arrowDashed { stroke:#8a8a8a; stroke-width:1.5; fill:none; stroke-dasharray:6,4; marker-end:url(#arrowG); }
    .arrowAccent { stroke:#b8860b; stroke-width:1.5; fill:none; stroke-dasharray:6,4; marker-end:url(#arrowG); }
    .edgeLbl { font-size:10px; fill:#5a5a5a; text-anchor:middle; }
    .title { font-size:23px; font-weight:700; fill:#111111; text-anchor:middle; }
    .subtitle { font-size:12.5px; fill:#5a5a5a; text-anchor:middle; }
    .containerLbl { font-size:11.5px; font-weight:700; fill:#8a8a8a; letter-spacing:0.5px; }
    .legendTxt { font-size:10.5px; fill:#333333; }
    .legendTitle { font-size:11px; font-weight:700; fill:#333333; }
  </style>

  <rect class="bg" x="0" y="0" width="1700" height="1460"/>
  <text class="title" x="850" y="34">Memory Write Pipeline</text>
  <text class="subtitle" x="850" y="53">POST /api/v1/memory → save_memory() — obsidian/server/main.py:2146, driving obsidian/manager_ai/pipeline.py</text>

  <!-- row1: request -->
  <rect class="box" x="380" y="80" width="460" height="56"/>
  <text class="lbl" x="610" y="105">POST /api/v1/memory</text>
  <text class="path" x="610" y="122">{ conversation | canonical_fact, external_key? }</text>

  <!-- row2: build conversation -->
  <rect class="box" x="380" y="166" width="460" height="56"/>
  <text class="lbl" x="610" y="189">Build Conversation</text>
  <text class="path" x="610" y="206">one Event per turn (multi-turn) or a single legacy USER Event</text>
  <line class="arrow" x1="610" y1="136" x2="610" y2="164"/>

  <!-- row3: checkpoint lookup gate -->
  <polygon class="gate" points="400,254 820,254 800,326 420,326"/>
  <text class="lbl" x="610" y="280">Checkpoint lookup</text>
  <text class="path" x="610" y="298">_checkpoint_lookup() — main.py:504</text>
  <text class="noteG" x="610" y="313">transcript_hash matches an existing ConversationCheckpoint?</text>
  <line class="arrow" x1="610" y1="222" x2="610" y2="252"/>

  <!-- duplicate short-circuit -->
  <rect class="calloutAccent" x="1400" y="256" width="260" height="70"/>
  <text class="lblSm" x="1530" y="277">status: "duplicate"</text>
  <text class="noteG" x="1530" y="292" fill="#8a6d1f">short-circuit — skips extraction,</text>
  <text class="noteG" x="1530" y="305" fill="#8a6d1f">classification, and persistence</text>
  <text class="noteG" x="1530" y="318" fill="#8a6d1f">near-zero duration</text>
  <line class="arrowAccent" x1="822" y1="290" x2="1398" y2="290"/>
  <text class="edgeLbl" x="1050" y="280">exact match: YES</text>

  <!-- row4: classify_turns gate -->
  <polygon class="gate" points="390,364 830,364 810,444 410,444"/>
  <text class="lbl" x="610" y="392">classify_turns()</text>
  <text class="path" x="610" y="409">obsidian/checkpoint/diff.py</text>
  <text class="noteG" x="610" y="425">→ first_run · incremental · fallback</text>
  <line class="arrow" x1="610" y1="326" x2="610" y2="362"/>
  <text class="edgeLbl" x="900" y="345">no match / no external_key</text>

  <!-- incremental context callout -->
  <rect class="callout" x="1400" y="360" width="260" height="84"/>
  <text class="lblSm" x="1530" y="380">incremental only:</text>
  <text class="noteG" x="1530" y="395" fill="#5a5a5a">_lookup_working_context()</text>
  <text class="noteG" x="1530" y="408" fill="#5a5a5a">→ MemoryEngine.query_working_context()</text>
  <text class="noteG" x="1530" y="421" fill="#5a5a5a">best-effort, fail-open →</text>
  <text class="noteG" x="1530" y="434" fill="#5a5a5a">existing_context (background only)</text>
  <line class="arrowDashed" x1="832" y1="402" x2="1398" y2="402"/>

  <!-- ManagerPipeline container -->
  <rect class="container" x="330" y="480" width="560" height="470"/>
  <text class="containerLbl" x="350" y="472">ManagerPipeline.process_with_trace() — obsidian/manager_ai/pipeline.py</text>
  <line class="arrow" x1="610" y1="444" x2="610" y2="478"/>

  <!-- extractor -->
  <rect class="boxAccent" x="360" y="504" width="500" height="68"/>
  <text class="lbl" x="610" y="528">Extractor.extract_with_trace()</text>
  <text class="path" x="610" y="544">extractor.py:113 — LLM call</text>
  <text class="note" x="610" y="559">1 repair retry on bad JSON · else zero facts · dedup by (text, source_event_id)</text>

  <!-- classifier / importance -->
  <rect class="boxAccent" x="360" y="602" width="240" height="82"/>
  <text class="lbl" x="480" y="628">Classifier.classify()</text>
  <text class="path" x="480" y="645">classifier.py — LLM call</text>
  <text class="note" x="480" y="659">1 repair retry, else</text>
  <text class="note" x="480" y="671">skip this fact</text>

  <rect class="boxAccent" x="620" y="602" width="240" height="82"/>
  <text class="lbl" x="740" y="628">ImportanceScorer.score()</text>
  <text class="path" x="740" y="645">importance.py — LLM call</text>
  <text class="note" x="740" y="659">1 repair retry, else</text>
  <text class="note" x="740" y="671">skip this fact</text>

  <line class="arrow" x1="610" y1="572" x2="610" y2="600"/>
  <line class="arrow" x1="600" y1="643" x2="618" y2="643"/>
  <text class="noteG" x="610" y="700">extract_classify_score() — per fact, concurrent (ThreadPoolExecutor, max_workers=min(#facts,8))</text>

  <!-- CanonicalMatcher -->
  <rect class="box" x="360" y="718" width="500" height="66"/>
  <text class="lbl" x="610" y="743">CanonicalMatcher.match_with_target()</text>
  <text class="path" x="610" y="759">canonical_matcher.py — deterministic text match, no LLM</text>
  <text class="noteG" x="610" y="773">exact text → CONFIRM · whole-word prefix extension → UPDATE · else → NEW</text>

  <!-- KnowledgeUpdater -->
  <rect class="box" x="360" y="820" width="500" height="66"/>
  <text class="lbl" x="610" y="845">KnowledgeUpdater.apply()</text>
  <text class="path" x="610" y="861">manager_ai/knowledge_updater.py</text>
  <text class="noteG" x="610" y="875">NEW: fresh evidence chain · CONFIRM: confidence +0.05 (capped 1.0) · UPDATE: confidence averaged, text replaced</text>

  <line class="arrow" x1="610" y1="784" x2="610" y2="818"/>
  <text class="path" x="610" y="936">match_and_apply() — pipeline.py:285, strictly sequential</text>

  <!-- LLM infra column -->
  <rect class="callout" x="990" y="500" width="330" height="200"/>
  <text class="lblSm" x="1155" y="522">ManagerAILLM</text>
  <text class="path" x="1155" y="538">obsidian/manager_ai/llm.py</text>
  <text class="noteG" x="1155" y="556" fill="#5a5a5a">single shared client, OpenAI-compatible</text>
  <text class="noteG" x="1155" y="569" fill="#5a5a5a">(qwen-plus via DashScope by default)</text>
  <text class="noteG" x="1155" y="582" fill="#5a5a5a">raises on missing key / network error —</text>
  <text class="noteG" x="1155" y="595" fill="#5a5a5a">does NOT fail open (user is waiting)</text>
  <line x1="1010" y1="608" x2="1300" y2="608" stroke="#cccccc"/>
  <text class="lblSm" x="1155" y="626">generate_with_transport_retry()</text>
  <text class="path" x="1155" y="641">manager_ai/transport_retry.py</text>
  <text class="noteG" x="1155" y="656" fill="#5a5a5a">wraps every llm.generate() call — 1 retry on</text>
  <text class="noteG" x="1155" y="669" fill="#5a5a5a">TimeoutError/ConnectionError/OSError/API*Error,</text>
  <text class="noteG" x="1155" y="682" fill="#5a5a5a">orthogonal to each stage's own JSON-repair retry</text>

  <line class="arrowDashed" x1="988" y1="538" x2="862" y2="538"/>
  <line class="arrowDashed" x1="988" y1="600" x2="602" y2="600"/>
  <line class="arrowDashed" x1="988" y1="650" x2="862" y2="643"/>

  <!-- persist knowledge objects -->
  <rect class="box" x="380" y="990" width="460" height="106"/>
  <text class="lbl" x="610" y="1013">_persist_knowledge_objects()</text>
  <text class="path" x="610" y="1029">main.py:620 — per KnowledgeObject, in order:</text>
  <text class="noteG" x="610" y="1045">1. VaultWriter.write(knowledge) → Markdown file, vault_dir</text>
  <text class="noteG" x="610" y="1059">2. OntologyPipeline.process_with_trace(knowledge):</text>
  <text class="noteG" x="610" y="1073">   propose → validate → apply to ConceptGraph → ConceptWriter.write()</text>
  <line class="arrow" x1="610" y1="950" x2="610" y2="988"/>

  <!-- checkpoint write -->
  <rect class="callout" x="380" y="1126" width="460" height="56"/>
  <text class="lblSm" x="610" y="1148">_write_checkpoint()</text>
  <text class="noteG" x="610" y="1163" fill="#5a5a5a">best-effort — failure degrades future dedup, never fails the response</text>
  <line class="arrowDashed" x1="610" y1="1096" x2="610" y2="1124"/>

  <!-- write trace -->
  <rect class="callout" x="380" y="1212" width="460" height="56"/>
  <text class="lblSm" x="610" y="1234">_persist_write_trace_best_effort()</text>
  <text class="noteG" x="610" y="1249" fill="#5a5a5a">persists a WriteTrace — diagnostics, never raises past this call</text>
  <line class="arrowDashed" x1="610" y1="1182" x2="610" y2="1210"/>

  <!-- response -->
  <rect class="box" x="380" y="1298" width="460" height="56"/>
  <text class="lbl" x="610" y="1322">Response: WriteResult</text>
  <text class="path" x="610" y="1339">knowledge objects created/confirmed/updated, mode, facts_extracted</text>
  <line class="arrow" x1="610" y1="1268" x2="610" y2="1296"/>

  <!-- duplicate -> response -->
  <path d="M1530,326 L1530,1326 L842,1326" class="arrowAccent" fill="none"/>

  <!-- legend -->
  <rect class="callout" x="990" y="1298" width="330" height="128"/>
  <text class="legendTitle" x="1005" y="1318">Legend</text>
  <line x1="1005" y1="1332" x2="1035" y2="1332" class="arrow"/>
  <text class="legendTxt" x="1042" y="1336">deterministic call / required sequence</text>
  <line x1="1005" y1="1349" x2="1035" y2="1349" class="arrowDashed"/>
  <text class="legendTxt" x="1042" y="1353">optional / best-effort, fail-open</text>
  <line x1="1005" y1="1366" x2="1035" y2="1366" class="arrowAccent"/>
  <text class="legendTxt" x="1042" y="1370">duplicate short-circuit path</text>
  <rect x="1005" y="1378" width="30" height="12" class="boxAccent"/>
  <text class="legendTxt" x="1042" y="1388">LLM call (non-deterministic)</text>
  <rect x="1005" y="1398" width="30" height="12" class="calloutAccent"/>
  <text class="legendTxt" x="1042" y="1408">terminal / skip-rest outcome</text>
</svg>
